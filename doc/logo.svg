<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace">
  <defs>
    <linearGradient id="emberSq" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FCA326"/>
      <stop offset="1" stop-color="#E24329"/>
    </linearGradient>
    <linearGradient id="smokeSq" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0" stop-color="#E24329"/>
      <stop offset="0.55" stop-color="#FC6D26"/>
      <stop offset="1" stop-color="#FCA326" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="glowSq" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FCA326" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FCA326" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== geometric fox head with cigar ===== -->
  <g transform="translate(5,70) scale(1.3)">
    <!-- head base -->
    <polygon points="45,25 120,60 195,25 205,110 120,190 35,110"
             fill="#FC6D26" stroke="#FC6D26" stroke-width="6" stroke-linejoin="round"/>
    <!-- right-side facet shading -->
    <polygon points="120,60 195,25 205,110 120,190" fill="#E24329" opacity="0.18"/>
    <!-- inner ears -->
    <polygon points="57,40 97,60 72,86" fill="#E24329"/>
    <polygon points="183,40 143,60 168,86" fill="#E24329"/>
    <!-- cream muzzle -->
    <polygon points="85,122 155,122 120,190" fill="#FFF1DD"/>
    <!-- nose -->
    <polygon points="110,128 130,128 120,143" fill="#3B3735"/>
    <!-- narrowed smug eyes -->
    <path d="M68 97 L98 104" stroke="#3B3735" stroke-width="7.5" stroke-linecap="round"/>
    <path d="M172 97 L142 104" stroke="#3B3735" stroke-width="7.5" stroke-linecap="round"/>
    <!-- cigar in the corner of the mouth -->
    <g transform="translate(130,161) rotate(9)">
      <rect x="0" y="-11" width="104" height="22" rx="11" fill="#3B3735"/>
      <rect x="24" y="-13" width="13" height="26" rx="5" fill="#FCA326"/>
      <path d="M92 -11 h4 a11 11 0 0 1 0 22 h-4 z" fill="url(#emberSq)"/>
      <circle cx="103" cy="0" r="7" fill="#FCA326"/>
      <circle cx="103" cy="0" r="3.5" fill="#FFF1DD"/>
    </g>
  </g>

  <!-- ===== smoke rising up the right side as a sparkline ===== -->
  <circle cx="318" cy="298" r="28" fill="url(#glowSq)"/>
  <polyline points="320,292 342,254 326,220 354,182 336,146 364,108 348,74 374,38"
            fill="none" stroke="url(#smokeSq)" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <circle cx="354" cy="182" r="5" fill="#FC6D26"/>
    <circle cx="364" cy="108" r="5" fill="#FCA326"/>
    <circle cx="374" cy="38" r="5" fill="#FCA326" opacity="0.6"/>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="165" y="382" font-size="52" font-weight="700" letter-spacing="2" text-anchor="middle">
    <tspan fill="#FC6D26">ci</tspan><tspan fill="#3B3735">gar</tspan>
  </text>
</svg>
