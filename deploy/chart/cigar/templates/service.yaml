apiVersion: v1
kind: Service
metadata:
  name: {{ include "cigar.fullname" . }}
  labels:
    {{- include "cigar.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.opsPort }}
      targetPort: ops
      protocol: TCP
      name: ops
  selector:
    {{- include "cigar.selectorLabels" . | nindent 4 }}
